<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>World Cup 2026 Round of 32</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg wc-navbar">
    <div class="container-fluid px-3 px-lg-4">
      <a href="/index.html" class="navbar-brand d-flex align-items-center gap-2 text-decoration-none">
        <span class="brand-ball"><i class="bi bi-dribbble"></i></span>
        <span class="brand-title">World Cup 2026 Pool</span>
      </a>
      <span id="round32UserBadge" class="navbar-text wc-user-badge"></span>
    </div>
  </nav>

  <main class="container py-4 py-lg-5">
    <section class="card wc-card shadow-sm mb-4">
      <div class="card-body d-flex flex-wrap justify-content-between align-items-center gap-2">
        <div>
          <h1 class="h4 mb-1 d-flex align-items-center gap-2"><i class="bi bi-diagram-3-fill"></i> Round of 32 Predictions</h1>
          <div class="text-muted small">Separate knockout-stage tournament so group stage data stays untouched.</div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-outline-secondary" id="round32RefreshBtn"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
          <a class="btn btn-outline-primary" href="/index.html"><i class="bi bi-arrow-left"></i> Back to Main</a>
        </div>
      </div>
    </section>

    <section class="card wc-card shadow-sm mb-4">
      <div class="card-body">
        <h2 class="h5 d-flex align-items-center gap-2"><i class="bi bi-trophy-fill"></i> Round of 32 Leaderboard</h2>
        <div id="round32Leaderboard"></div>
      </div>
    </section>

    <section class="card wc-card shadow-sm">
      <div class="card-body">
        <h2 class="h5 d-flex align-items-center gap-2"><i class="bi bi-clipboard2-check-fill"></i> My Round of 32 Picks</h2>
        <div class="table-responsive">
          <table class="table align-middle table-sm" id="round32Table"></table>
        </div>
      </div>
    </section>
  </main>

  <script src="/round32.js"></script>
</body>
</html>
